<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Détail liste - Suivi Matériel</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="site-detail">
    <div class="app-shell">
      <header class="app-header app-header--detail">
        <div class="app-header__side app-header__side--left">
          <button class="back-button" type="button" data-back="index.html" aria-label="Retour"><img src="Icon/btn-retour.png" alt="retour" class="btn-retour" /></button>
        </div>
        <div class="app-header__center">
          <div class="header-title header-title--stacked">
            <h1 id="siteTitle">Chargement...</h1>
            <p id="itemCount" class="site-detail-subtitle">0 OUTS</p>
          </div>
        </div>
        <div class="app-header__side app-header__side--right" aria-hidden="true"></div>
      </header>

      <main class="page-content">
        <section class="search-panel search-panel--site surface-card section">
          <label class="input-group">
            <span class="sr-only">Rechercher (OUT ou article)</span>
            <span class="site-search-icon-wrap" aria-hidden="true"><img src="Icon/Recherche.png" alt="" class="site-search-icon" /></span>
            <input
              id="itemSearchInput"
              class="search-input"
              type="search"
              placeholder="Rechercher (OUT ou article)"
              autocomplete="off"
            />
          </label>
          <section class="auth-required-card auth-required-card--embedded section" data-auth-required-card hidden>
            <span class="auth-required-card__icon" aria-hidden="true">i</span>
            <p class="auth-required-card__message">Vous devez vous connecter pour modifier les données.</p>
            <button type="button" class="auth-required-card__action" data-auth-login-action>
              <span>Se connecter</span>
              <span aria-hidden="true">›</span>
            </button>
          </section>
          <div class="filter-chip-group filters" role="group" aria-label="Filtrer les résultats par date">
            <button class="filter-chip" type="button" data-filter-chip="all">Tous</button>
            <button class="filter-chip" type="button" data-filter-chip="today">Aujourd’hui</button>
            <button class="filter-chip" type="button" data-filter-chip="yesterday">Hier</button>
            <button class="filter-chip" type="button" data-filter-chip="lastMonth">Plus ancien</button>
          </div>
          <label class="sr-only" for="itemDateFilter">Filtrer les résultats par date</label>
          <select id="itemDateFilter" class="visually-hidden-control" aria-label="Filtrer les résultats par date">
            <option value="all">Tous</option>
            <option value="today">Aujourd'hui</option>
            <option value="yesterday">Hier</option>
            <option value="lastMonth">Plus Ancien</option>
          </select>
        </section>

        <section id="itemList" class="list-grid" aria-live="polite"></section>
      </main>

      <div class="site-detail-fab-stack" aria-hidden="false">
        <div class="site-detail-fab-row" data-fab-row="create">
          <span class="site-detail-fab-label site-detail-fab-label--create">Créer un OUT</span>
          <button id="openCreateItem" class="fab fab-add" type="button" aria-label="Ajouter un numéro OUT">+</button>
        </div>
        <div class="site-detail-fab-row" data-fab-row="export">
          <span class="site-detail-fab-label site-detail-fab-label--export">Exporter</span>
          <button type="button" id="openExportItems" class="fab fab--export" aria-label="Exporter">
            <img src="Icon/Exporter.png" alt="" aria-hidden="true" class="fab--export__icon" />
          </button>
        </div>
      </div>

      <dialog id="itemDialog" class="modal-card">
        <form method="dialog" class="modal-content modal-content--site-create modal-content--item-create" id="itemForm">
          <div class="modal-header">
            <h2>Nouveau numéro OUT</h2>
          </div>
          <label class="input-group input-group--site-create input-group--item-create">
            <span>Numéro OUT</span>
            <input
              id="itemNumberInput"
              name="itemNumber"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="10"
              minlength="4"
              placeholder="Exemple : 26050200"
            />
            <div class="item-input-feedback-row">
              <p id="itemFormError" class="form-error" aria-live="polite"></p>
              <span id="itemNumberCounter" class="input-char-counter" aria-live="polite">0 / 0</span>
            </div>
          </label>
          <label class="input-group input-group--site-create input-group--item-create">
            <span>Magasin</span>
            <select id="itemStoreSelect" name="itemStore">
              <option value="">-- Sélectionner --</option>
              <option value="TIT I">TIT I</option>
              <option value="HAG 36">HAG 36</option>
              <option value="BY Pass">BY Pass</option>
              <option value="Autre à préciser">Autre à préciser</option>
            </select>
          </label>
          <label id="itemStoreOtherGroup" class="input-group input-group--site-create input-group--item-create" hidden>
            <span>Préciser le magasin</span>
            <input id="itemStoreOtherInput" name="itemStoreOther" type="text" placeholder="Ex : Dépôt secondaire" />
          </label>
          <div class="modal-actions modal-actions--split modal-actions--site-create modal-actions--item-create">
            <button type="button" class="btn btn-neutral" data-close-dialog>Annuler</button>
            <button id="itemCreateSubmitButton" type="submit" class="btn btn-success">
              <span class="btn-label-default">Créer</span>
              <span class="btn-loading-spinner" aria-hidden="true"></span>
              <span class="btn-label-loading" aria-hidden="true">Création...</span>
            </button>
          </div>
        </form>
      </dialog>

      <dialog id="siteExportDialog" class="modal-card">
        <form method="dialog" class="modal-content modal-content--site-create" id="siteExportForm">
          <div class="modal-header">
            <h2>Exporter les données</h2>
          </div>
          <p class="modal-helper-text">Choisissez un nom de fichier avant l’export.</p>
          <label class="input-group input-group--site-create">
            <span>Nom du fichier</span>
            <div class="typeahead">
              <input id="siteExportFileNameInput" name="siteExportFileName" type="text" placeholder="Ex : export-materiel" autocomplete="off" />
            </div>
          </label>
          <p id="siteExportFileNameError" class="form-error" aria-live="polite"></p>
          <div class="modal-actions modal-actions--split modal-actions--site-create">
            <button type="button" id="siteExportCancelButton" class="btn btn-neutral">Annuler</button>
            <button id="siteExportSubmitButton" type="submit" class="btn btn-success" disabled>
              <span class="btn-label-default">Exporter</span>
              <span class="btn-label-loading" aria-hidden="true">Exportation...</span>
            </button>
          </div>
        </form>
      </dialog>

      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <script type="module" src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
