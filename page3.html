<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Détail complet - Suivi Matériel</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8A6NfA5RkXU4Q9z+7A8R2f2Y6xQfHXA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      body[data-page="item-detail"] .search-panel .input-group {
        position: relative;
      }

      body[data-page="item-detail"] .search-input__icon-wrap {
        position: absolute;
        left: 0.95rem;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        opacity: 0.55;
        pointer-events: none;
      }

      body[data-page="item-detail"] .search-input__icon {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      body[data-page="item-detail"] #detailSearchInput {
        padding-left: 2.6rem;
      }
    </style>
  </head>
  <body data-page="item-detail">
    <div class="app-shell app-shell--wide">
      <header class="app-header app-header--detail">
        <button class="back-button" type="button" id="itemBackButton" aria-label="Retour"><img src="Icon/btn-retour.png" alt="retour" class="btn-retour" /></button>
        <div class="header-title header-title--stacked">
          <h1 id="itemTitle">Chargement...</h1>
        </div>
      </header>

      <main class="page-content page-content--wide">
        <section class="surface-card table-card section">
          <div class="section-heading section-heading--table">
            <div>
              <h2 class="section-title">Tableau des données</h2>
              <p id="detailCount">0 OUT</p>
            </div>
            <button type="button" id="exportDetailsButton" class="btn btn-success">Exporter</button>
          </div>
          <div class="search-panel search-panel--inline">
            <label class="input-group">
              <span>Recherche</span>
              <span class="search-input__icon-wrap" aria-hidden="true">
                <img src="Icon/Recherche.png" alt="" class="search-input__icon" />
              </span>
              <input id="detailSearchInput" class="search-input" type="text" placeholder="Entrer votre Recherche..." autocomplete="off" />
            </label>
          </div>
          <div class="table-container table-container--card" id="detailTableContainer">
            <div class="table-wrapper table-wrapper--shared" id="detailTableWrapper">
              <table class="data-table" id="detailDataTable">
              <thead>
                <tr>
                  <th>#   </th>
                  <th>Code</th>
                  <th>Désignation</th>
                  <th>Qté Sortie</th>
                  <th>Qté posée</th>
                  <th>Qté Retour</th>
                  <th>Ecart</th>
                  <th>Remarque</th>
                  <th>Date de création</th>
                  <th>Date de modification</th>
                  <th>Action</th>
                </tr>
              </thead>
                <tbody id="detailTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>

      <button type="button" id="openDetailFormButton" class="fab-add fab-add--item-detail" aria-label="Ajouter une donnée">+</button>

      <dialog id="detailFormModal" class="modal-card detail-form-modal">
        <div class="modal-content detail-form-modal__content">
          <div class="modal-header">
            <h2>Ajouter une donnée</h2>
          </div>
          <section id="detailFormSection" class="surface-card form-card section detail-form-modal__section">
            <form id="detailForm" class="responsive-form" novalidate>
              <label class="input-group">
                <span>Code</span>
                <div class="typeahead" id="codeTypeahead">
                  <input id="codeInput" name="code" type="text" maxlength="40" aria-label="Code" autocomplete="off" />
                  <div id="codeSuggestions" class="typeahead__menu" role="listbox" aria-label="Suggestions de code" hidden></div>
                </div>
              </label>
              <label class="input-group input-group--wide">
                <span>Désignation</span>
                <input id="designationInput" name="designation" type="text" maxlength="120" required />
              </label>
              <label class="input-group">
                <span>Qté Sortie</span>
                <input id="qteSortieInput" name="qteSortie" type="number" min="0" step="1" />
              </label>
              <label class="input-group">
                <span>Unité</span>
                <select id="uniteInput" name="unite">
                  <option value="m">m</option>
                  <option value="Pcs">Pcs</option>
                </select>
              </label>
              <div class="form-footer">
                <p id="detailFormError" class="form-error" aria-live="polite"></p>
                <button type="button" class="btn" id="cancelDetailFormButton">Annuler</button>
                <button type="submit" class="btn btn-success">Enregistrer</button>
              </div>
            </form>
          </section>
        </div>
      </dialog>

      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <script type="module" src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
