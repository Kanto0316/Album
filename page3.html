<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Détail complet - Suivi Matériel</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8A6NfA5RkXU4Q9z+7A8R2f2Y6xQfHXA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body data-page="item-detail">
    <div class="app-shell app-shell--wide">
      <header class="app-header app-header--detail">
        <button class="back-button" type="button" id="itemBackButton" aria-label="Retour">←</button>
        <div>
          <h1 id="itemTitle">Chargement...</h1>
        </div>
      </header>

      <main class="page-content page-content--wide">
        <section class="surface-card form-card">
          <form id="detailForm" class="responsive-form" novalidate>
            <label class="input-group">
              <span>Code</span>
              <input id="codeInput" name="code" type="text" maxlength="40" aria-label="Code" />
            </label>
            <label class="input-group input-group--wide">
              <span>Désignation</span>
              <input id="designationInput" name="designation" type="text" maxlength="120" required />
            </label>
            <label class="input-group">
              <span>Qté Sortie</span>
              <input id="qteSortieInput" name="qteSortie" type="number" min="0" step="1" />
            </label>
            <label class="input-group">
              <span>Unité</span>
              <select id="uniteInput" name="unite">
                <option value="m">m</option>
                <option value="Pcs">Pcs</option>
              </select>
            </label>
            <div class="form-footer">
              <p id="detailFormError" class="form-error" aria-live="polite"></p>
              <button type="submit" class="btn btn-success">Enregistrer</button>
            </div>
          </form>
        </section>

        <section class="surface-card table-card">
          <div class="section-heading section-heading--sticky">
            <div>
              <h2>Tableau des données</h2>
              <p id="detailCount">0 ligne</p>
            </div>
            <button type="button" id="exportDetailsButton" class="btn btn-success">Exporter</button>
          </div>
          <div class="search-panel search-panel--inline">
            <label class="input-group">
              <span>Recherche</span>
              <input id="detailSearchInput" type="text" placeholder="Rechercher..." autocomplete="off" />
            </label>
          </div>
          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr>
                  <th>#   </th>
                  <th>Code</th>
                  <th>Désignation</th>
                  <th>Qté Sortie</th>
                  <th>Qté posée</th>
                  <th>Qté Retour</th>
                  <th>Ecart</th>
                  <th>Remarque</th>
                  <th>Date création</th>
                  <th>Date modification</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="detailTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>

      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <script type="module" src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
