<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gestion des utilisateurs - Suivi Matériel</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="users-management">
    <div class="app-shell app-shell--wide">
      <header class="app-header app-header--detail">
        <button id="usersBackButton" class="back-button" type="button" aria-label="Retour"><img src="Icon/btn-retour.png" alt="retour" class="btn-retour" /></button>
        <div class="header-title"><h1>Gestion Admin</h1></div>
      </header>
      <main class="page-content page-content--wide">
        <section class="surface-card details-card">
          <h2 class="section-title">Maintenance de la page</h2>
          <div class="maintenance-toggle-row">
            <span class="maintenance-toggle-row__label">Page en cours de mainenance </span>
            <label class="switch" for="maintenanceToggle">
              <input id="maintenanceToggle" type="checkbox" role="switch" aria-label="Activer ou désactiver la maintenance" />
              <span class="slider"></span>
            </label>
            <span id="maintenanceStatusText" class="maintenance-toggle-row__status">Désactivé</span>
          </div>
        </section>
        <section class="surface-card table-card">
          <h2 class="section-title">Utilisateurs en attente</h2>
          <div id="pendingUsersList" class="pending-users-list"></div>
        </section>
        <section class="surface-card table-card">
          <h2 class="section-title">Tous les utilisateurs</h2>
           <div class="table-wrapper table-wrapper--users">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Photo</th>
                  <th>Nom</th>
                  <th>Statut</th>
                  <th>Rôle</th>
                  <th>Autorisé (maintenance)</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
      <div id="toast" class="toast" aria-live="polite"></div>
    </div>
    <script type="module" src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
