<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Suivi Matériel</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="home">
    <div class="app-shell">
      <header class="app-header app-header--home">
        <h1>Suivi Matériel</h1>
        <div class="header-menu">
          <button
            id="homeMenuButton"
            class="icon-button header-menu__trigger"
            type="button"
            aria-label="Plus d'options"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span aria-hidden="true">⋯</span>
          </button>
          <div id="homeMenuPanel" class="header-menu__panel" role="menu" hidden>
            <button id="importDataButton" class="header-menu__option" type="button" role="menuitem">
              Importer les données
            </button>
            <button id="mergeDataButton" class="header-menu__option" type="button" role="menuitem">
              Fusionner les données
            </button>
            <button id="exportDataButton" class="header-menu__option" type="button" role="menuitem">
              Exporter les données
            </button>
            <button id="quitButton" class="header-menu__option" type="button" role="menuitem">
              Quiter
            </button>
          </div>
          <input
            id="importDataInput"
            class="file-picker-input"
            type="file"
            accept=".su,.json,application/json"
            data-import-mode="replace"
            tabindex="-1"
            aria-hidden="true"
          />
          <input
            id="mergeDataInput"
            class="file-picker-input"
            type="file"
            accept=".su,.json,application/json"
            data-import-mode="merge"
            tabindex="-1"
            aria-hidden="true"
          />
        </div>
      </header>

      <main class="page-content">
        <section class="search-panel surface-card">
          <label class="input-group">
            <span class="sr-only">Recherche</span>
            <input id="searchInput" type="search" placeholder="Recherche..." autocomplete="off" />
          </label>
        </section>

        <section class="section-heading section-heading--sticky">
          <div>
            <h2>Sites enregistrés</h2>
            <p id="siteCount">0 site</p>
          </div>
        </section>

        <section id="siteList" class="list-grid" aria-live="polite"></section>
      </main>


      <button id="openCreateSite" class="fab" type="button" aria-label="Créer un site">+</button>

      <dialog id="siteDialog" class="modal-card">
        <form method="dialog" class="modal-content" id="siteForm">
          <div class="modal-header">
            <h2>Entrer nom du site</h2>
            <button type="button" class="icon-button" data-close-dialog aria-label="Fermer">×</button>
          </div>
          <label class="input-group">
            <span>Nom du site</span>
            <input id="siteNameInput" name="siteName" type="text" maxlength="80" />
          </label>
          <p id="siteFormError" class="form-error" aria-live="polite"></p>
          <div class="modal-actions">
            <button type="submit" class="btn btn-success">Créer</button>
          </div>
        </form>
      </dialog>

      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
