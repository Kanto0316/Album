<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tous les matériels - Suivi Matériel</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8A6NfA5RkXU4Q9z+7A8R2f2Y6xQfHXA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      .materials-page .search-panel .input-group {
        position: relative;
      }

      .materials-page .search-input__icon-wrap {
        position: absolute;
        left: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        width: 24px !important;
        height: 24px !important;
        flex: 0 0 24px !important;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        overflow: hidden;
      }

      .materials-page .search-input__icon,
      .materials-page .search-input__icon-wrap img,
      .materials-page .search-panel img {
        width: 24px !important;
        height: 24px !important;
        object-fit: contain !important;
      }

      .materials-page #materialsSearchInput {
        padding-left: 3rem;
      }

      .materials-page #materialsTableBody tr {
        cursor: pointer;
      }

      .materials-page #materialsTableBody tr:hover {
        background: rgba(59, 130, 246, 0.08);
      }

      .materials-page #materialCartFab,
      .materials-page .cart-fab {
        right: 24px !important;
        left: auto !important;
        bottom: 24px !important;
      }

      .materials-page .cart-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #ef4444;
        color: #fff;
        font-size: 12px;
        font-weight: 800;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
      }

      .materials-page .cart-badge.visible {
        display: flex;
      }

      .materials-page .material-cart-list {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        margin: 0.75rem 0 1rem;
        max-height: 45vh;
        overflow: auto;
      }

      .materials-page .material-cart-card {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 14px;
        padding: 0.65rem 0.75rem;
        background: #f8fbff;
      }

      .materials-page .material-cart-card p {
        margin: 0.2rem 0 0;
        color: #64748b;
      }

      .materials-page .remove-cart-item-btn {
        border: 0;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #e2e8f0;
        color: #0f172a;
        font-size: 1.1rem;
        line-height: 1;
      }

      .materials-page .qty-control {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin-top: 0.5rem;
      }

      .materials-page .qty-control .btn {
        min-height: 28px;
        padding: 0.2rem 0.45rem;
      }

      .materials-page .qty-value {
        min-width: 1.5rem;
        text-align: center;
        font-weight: 700;
      }

      .materials-page .qty-edit-btn {
        border: 0;
        background: transparent;
        padding: 0;
        line-height: 1.2;
        cursor: pointer;
      }

    </style>
  </head>
  <body data-page="all-materials" class="page3 materials-page">
    <div class="app-shell app-shell--wide">
      <header class="app-header app-header--detail">
        <div class="app-header__side app-header__side--left">
          <button class="back-button" type="button" id="materialsBackButton" aria-label="Retour"><img src="Icon/btn-retour.png" alt="retour" class="btn-retour" /></button>
        </div>
        <div class="app-header__center">
          <div class="header-title header-title--stacked">
            <h1>Tous les matériels</h1>
          </div>
        </div>
        <div class="app-header__side app-header__side--right" aria-hidden="true"></div>
      </header>

      <main class="page-content page-content--wide main-content">
        <section class="surface-card table-card section">
          <div class="section-heading section-heading--table">
            <div class="header-top page3-summary-header">
              <div class="title-block page3-title-block">
                <h2 class="section-title">Tableau des matériels</h2>
              </div>
            </div>
          </div>
          <div class="page3-sub-info">
            <div id="materialsCount" class="article-count page3-article-count">
              <span class="count-number page3-count-number">0</span>
              <span class="count-label page3-count-label">Matériels</span>
            </div>
          </div>
          <div class="search-panel search-panel--inline">
            <label class="input-group">
              <span class="search-input__icon-wrap" aria-hidden="true">
                <img src="Icon/Recherche.png" alt="" class="search-input__icon" />
              </span>
              <input id="materialsSearchInput" class="search-input" type="text" placeholder="Rechercher un matériel..." autocomplete="off" />
              <button id="materialsClearSearchBtn" class="clear-search-btn" type="button" aria-label="Effacer la recherche">×</button>
            </label>
          </div>
          <div class="table-container table-container--card">
            <div class="table-wrapper table-wrapper--shared">
              <table class="data-table" id="materialsDataTable">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Désignation</th>
                  </tr>
                </thead>
                <tbody id="materialsTableBody"></tbody>
              </table>
            </div>
          </div>
          <p id="materialsEmptyState" class="empty-state" hidden>Aucun matériel disponible.</p>
        </section>
      </main>

      <button id="materialCartFab" class="fab fab-add cart-fab hidden" type="button" aria-label="Voir la demande matériel">
        🛒
        <span id="materialCartBadge" class="cart-badge">0</span>
      </button>

      <dialog id="materialCartModal" class="modal-card">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Demande de matériel</h2>
          </div>
          <div id="materialCartList" class="material-cart-list"></div>
          <div class="modal-actions modal-actions__row modal-actions__row--pair">
            <button id="clearMaterialCartBtn" class="btn btn-secondary" type="button">Vider</button>
            <button id="viewMaterialRequestBtn" class="btn btn-primary" type="button">Voir la demande</button>
          </div>
        </div>
      </dialog>


      <dialog id="materialRequestPreviewModal" class="modal-card modal-card--wide">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Demande de matériel</h2>
          </div>
          <p class="table-rotate-hint">Tournez votre téléphone pour mieux voir le tableau.</p>
          <div class="table-container table-container--card">
            <div class="table-wrapper table-wrapper--shared">
              <table class="data-table" id="materialRequestPreviewTable">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Désignation</th>
                    <th>Quantité demandée</th>
                  </tr>
                </thead>
                <tbody id="materialRequestPreviewBody"></tbody>
              </table>
            </div>
          </div>
          <p id="materialRequestPreviewEmptyState" class="empty-state" hidden>Aucun matériel dans la demande.</p>
          <div class="modal-actions modal-actions__row modal-actions__row--pair">
            <button id="backToMaterialCartBtn" class="btn btn-secondary" type="button">Retour</button>
            <button id="exportMaterialRequestBtn" class="btn btn-primary" type="button">Exporter</button>
          </div>
        </div>
      </dialog>

      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <script type="module" src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script type="module" src="js/materiels.js"></script>
  </body>
</html>
